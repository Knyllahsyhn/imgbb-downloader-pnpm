name: Deploy worker to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: read

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: lewagon/wait-on-check-action@v1.8.1
        with:
          ref: ${{ github.sha }}
          check-name: lint-typecheck-build
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  deploy:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: latest
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy

      - name: Smoke test
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.WORKER_API_URL }}/api/health")
          if [ "$status" != "200" ]; then
            echo "::error::Worker health check failed — got HTTP $status from ${{ vars.WORKER_API_URL }}/api/health"
            exit 1
          fi
